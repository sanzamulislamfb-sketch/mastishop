<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Admin Login</title>
<style>
    body {
        font-family: 'Segoe UI', Arial, sans-serif;
        background: #f5f6fa;
        display: flex;
        align-items: center;
        justify-content: center;
        height: 100vh;
        margin: 0;
    }
    .card {
        background: white;
        padding: 32px;
        border-radius: 14px;
        box-shadow: 0 4px 16px rgba(0,0,0,0.08);
        width: 300px;
        text-align: center;
    }
    h2 { color: #e74c3c; margin-top: 0; }
    input {
        width: 100%;
        box-sizing: border-box;
        padding: 12px;
        border: 1px solid #ddd;
        border-radius: 8px;
        margin: 14px 0;
        font-size: 15px;
    }
    button {
        width: 100%;
        padding: 12px;
        border: none;
        border-radius: 8px;
        background: #e74c3c;
        color: white;
        font-size: 15px;
        font-weight: 600;
        cursor: pointer;
    }
    .error { color: #c0392b; font-size: 14px; }
</style>
</head>
<body>
    <div class="card">
        <h2>Admin Login</h2>
        {% if error %}<p class="error">{{ error }}</p>{% endif %}
        <form method="POST">
            <input type="password" name="password" placeholder="Password" required>
            <button type="submit">Login</button>
        </form>
    </div>
</body>
</html>
